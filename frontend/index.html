<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学号姓名展示系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>学号系统</span>
            </div>
            <div class="nav-controls">
                <button class="btn-config" onclick="openConfig()">
                    <i class="fas fa-cog"></i> 配置
                </button>
            </div>
        </nav>

        <!-- 主要内容 -->
        <main>
            <section class="hero-section">
                <h1>个人信息展示</h1>
                <p class="subtitle">可配置、可迁移的学生信息管理系统</p>

                <div class="info-card">
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>

                    <div class="info-content">
                        <div class="info-row">
                            <span class="label"><i class="fas fa-id-card"></i> 学号：</span>
                            <span class="value" id="studentId">423830219</span>
                        </div>

                        <div class="info-row">
                            <span class="label"><i class="fas fa-user"></i> 姓名：</span>
                            <span class="value" id="studentName">刘梓威</span>
                        </div>

                        <div class="info-row">
                            <span class="label"><i class="fas fa-building"></i> 学院：</span>
                            <span class="value" id="studentDepartment">人工智能学院</span>
                        </div>

                        <div class="info-row">
                            <span class="label"><i class="fas fa-calendar"></i> 入学年份：</span>
                            <span class="value" id="enrollmentYear">2023</span>
                        </div>

                        <div class="info-row">
                            <span class="label"><i class="fas fa-clock"></i> 系统时间：</span>
                            <span class="value" id="currentTime">--:--:--</span>
                        </div>
                    </div>

                    <div class="card-footer">
                        <span>最后更新：<span id="lastUpdate">--</span></span>
                        <button class="btn-refresh" onclick="refreshData()">
                            <i class="fas fa-sync-alt"></i> 刷新
                        </button>
                    </div>
                </div>
            </section>

            <!-- 配置面板（默认隐藏） -->
            <div class="config-modal" id="configModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2><i class="fas fa-sliders-h"></i> 系统配置</h2>
                        <button class="btn-close" onclick="closeConfig()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>

                    <div class="modal-body">
                        <div class="form-group">
                            <label for="configStudentId">
                                <i class="fas fa-id-badge"></i> 学号
                            </label>
                            <input type="text" id="configStudentId"
                                   placeholder="请输入学号"
                                   value="423830219">
                        </div>

                        <div class="form-group">
                            <label for="configStudentName">
                                <i class="fas fa-signature"></i> 姓名
                            </label>
                            <input type="text" id="configStudentName"
                                   placeholder="请输入姓名"
                                   value="刘梓威">
                        </div>

                        <div class="form-group">
                            <label for="configDepartment">
                                <i class="fas fa-university"></i> 学院
                            </label>
                            <input type="text" id="configDepartment"
                                   placeholder="请输入学院"
                                   value="人工智能学院">
                        </div>

                        <div class="form-group">
                            <label for="configTheme">
                                <i class="fas fa-palette"></i> 主题颜色
                            </label>
                            <select id="configTheme">
                                <option value="blue">蓝色主题</option>
                                <option value="green">绿色主题</option>
                                <option value="purple">紫色主题</option>
                                <option value="dark">深色主题</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>
                                <i class="fas fa-redo"></i> 自动刷新
                                <label class="switch">
                                    <input type="checkbox" id="configAutoRefresh" checked>
                                    <span class="slider"></span>
                                </label>
                            </label>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="closeConfig()">
                            取消
                        </button>
                        <button class="btn btn-primary" onclick="saveConfig()">
                            <i class="fas fa-save"></i> 保存配置
                        </button>
                        <button class="btn btn-success" onclick="exportConfig()">
                            <i class="fas fa-download"></i> 导出配置
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer>
            <p>© 2026 学号姓名展示系统 | 版本: <span id="appVersion">1.0.0</span></p>
            <p class="build-info">
                项目地址: <a href="https://github.com/你的用户名/student-info-system" target="_blank">
                    github.com/你的用户名/student-info-system
                </a>
            </p>
        </footer>
    </div>

    <!-- JavaScript 文件 -->
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
